<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteTrack — ระบบติดตามงานผู้รับเหมา</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .landing { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card-l { background: var(--surface); border: 1px solid var(--line); border-radius: 20px;
      padding: clamp(26px, 5vw, 44px); max-width: 460px; width: 100%; box-shadow: var(--shadow-lg); text-align: center; }
    .card-l .logo { width: 56px; height: 56px; border-radius: 15px; background: var(--accent); color: #fff;
      font-weight: 900; font-size: 28px; display: grid; place-items: center; margin: 0 auto 16px; }
    .card-l h1 { margin: 0 0 6px; font-size: 26px; font-weight: 800; letter-spacing: -.01em; }
    .card-l p { margin: 0 0 26px; color: var(--ink-2); font-size: 14.5px; }
    .roles { display: flex; flex-direction: column; gap: 12px; }
    .role-btn { display: flex; align-items: center; gap: 14px; text-align: left; text-decoration: none;
      background: var(--surface); border: 1px solid var(--line-2); border-radius: 14px; padding: 16px 18px; color: var(--ink);
      transition: border-color .15s, transform .1s; }
    .role-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
    .role-btn .ic { width: 44px; height: 44px; border-radius: 11px; display: grid; place-items: center; font-size: 22px; flex: 0 0 auto; }
    .role-btn .tx b { display: block; font-size: 15.5px; }
    .role-btn .tx small { color: var(--ink-3); font-size: 12.5px; }
    .role-btn .arr { margin-left: auto; color: var(--ink-3); font-size: 20px; }
    .badge-proto { display: inline-block; margin-top: 22px; font-size: 11.5px; font-weight: 700;
      color: var(--accent); background: var(--accent-soft); padding: 5px 12px; border-radius: 999px; }
    .top-r { position: fixed; top: 16px; right: 16px; }
  </style>
</head>
<body>
  <div class="top-r"><button class="theme-toggle" id="themeBtn" onclick="UI.toggleTheme()">☾</button></div>
  <div class="landing">
    <div class="card-l">
      <div class="logo">S</div>
      <h1>SiteTrack</h1>
      <p>ระบบติดตามงานผู้รับเหมา · แจ้งปัญหาหน้างาน · แดชบอร์ดผู้บริหาร · แจ้งเตือนผ่าน LINE</p>
      <div class="roles">
        <a class="role-btn" href="app.html">
          <span class="ic" style="background:var(--accent-soft);color:var(--accent)">👷</span>
          <span class="tx"><b>ผู้รับเหมา / หน้างาน</b><small>ดูงาน · อัพเดทความคืบหน้า · แจ้งปัญหา</small></span>
          <span class="arr">→</span>
        </a>
        <a class="role-btn" href="pm.html">
          <span class="ic" style="background:var(--st-prog-bg);color:var(--st-prog)">✔</span>
          <span class="tx"><b>ผู้จัดการโครงการ</b><small>มอบหมายงาน · อนุมัติ · ตอบปัญหา</small></span>
          <span class="arr">→</span>
        </a>
        <a class="role-btn" href="dashboard.html">
          <span class="ic" style="background:var(--st-done-bg);color:var(--st-done)">📊</span>
          <span class="tx"><b>ผู้บริหาร</b><small>แดชบอร์ดภาพรวมทุกโครงการ</small></span>
          <span class="arr">→</span>
        </a>
      </div>
      <span class="badge-proto">● PROTOTYPE — ใช้ข้อมูลจำลอง (mock data)</span>
    </div>
  </div>
  <script src="js/ui.js"></script>
  <script>UI.initTheme();</script>
</body>
</html>
